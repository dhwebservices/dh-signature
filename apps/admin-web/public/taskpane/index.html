<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DH Signature</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      :root {
        color: #162033;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, #eef3fb 100%);
      }

      body {
        margin: 0;
        padding: 18px;
      }

      .shell {
        border: 1px solid rgba(20, 31, 61, 0.08);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 14px 32px rgba(19, 33, 60, 0.06);
        padding: 18px;
      }

      .eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #7b879d;
      }

      h1 {
        margin: 8px 0 10px;
        font-size: 28px;
        line-height: 1.02;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0 0 16px;
        color: #67748d;
      }

      .button {
        height: 44px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #3b67f2, #2443af);
        color: #fff;
        padding: 0 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .meta {
        font-size: 12px;
        color: #67748d;
        margin-top: 10px;
      }

      .preview {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid rgba(20, 31, 61, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="eyebrow">DH Signature</div>
      <h1>Outlook compose add-in</h1>
      <p>Preview the exact signature HTML currently generated for the signed-in sender.</p>
      <button id="loadSignature" class="button" type="button">Load my signature</button>
      <div id="meta" class="meta"></div>
      <div id="preview" class="preview"></div>
    </div>
    <script src="/taskpane/index.js"></script>
  </body>
</html>
